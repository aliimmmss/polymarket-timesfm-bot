# Polymarket Trading Bot Default Configuration

monitor:
  poll_interval: 5
  clob_poll_interval: 10
  log_dir: "data/observations"
  max_log_files: 10

strategy:
  signal_a:
    gap_threshold: 20.0
    max_price: 0.55
    min_time_remaining: 300  # 5 minutes
    cvd_confirm: true  # Require CVD to agree with direction
  
  signal_b:
    gap_threshold: 50.0
    max_price: 0.95
    max_time_remaining: 180  # 3 minutes
  
  signal_c:
    cvd_threshold: 50.0
    obi_threshold: 0.30
    max_price: 0.50
    min_time_remaining: 300

trading:
  dry_run: true  # MUST be true for testing
  auto_trade: false
  trade_amount: 5.0
  max_order_size: 10.0
  daily_loss_limit: 20.0

stop_loss:
  gap_threshold: 10.0  # If gap drops below $10, sell
  prob_pct: 0.15  # 15% drop from entry price
  check_interval: 5.0
  min_hold_time: 30.0

data:
  binance_websocket: true
  polymarket_api: "https://gamma-api.polymarket.com"
  clob_api: "https://clob.polymarket.com"
  crypto_price_api: "https://polymarket.com/api/crypto/crypto-price"
