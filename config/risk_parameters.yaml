# Risk Management Parameters

portfolio_level:
  max_daily_loss: 0.05  # 5% of portfolio
  max_weekly_loss: 0.15  # 15% of portfolio
  max_monthly_loss: 0.25  # 25% of portfolio
  circuit_breaker_enabled: true
  circuit_breaker_consecutive_losses: 3
  circuit_breaker_daily_loss: 0.03  # 3% triggers review
  portfolio_rebalancing_interval: 168  # 1 week in hours
  
position_sizing:
  base_position_size: 0.05  # 5% of portfolio
  max_position_size: 0.10  # 10% maximum
  min_position_size: 0.01  # 1% minimum
  confidence_multiplier:
    high: 2.0  # Tight confidence bands
    medium: 1.0  # Medium confidence
    low: 0.5   # Wide confidence bands
  liquidity_adjusted:
    min_liquidity: 10000.0  # USD
    max_trade_ratio: 0.20  # Max 20% of daily volume
    
category_limits:
  max_category_exposure: 0.30  # 30% per category
  category_definitions:
    politics: ["elections", "policy", "international"]
    finance: ["crypto", "stocks", "economics", "interest_rates"]
    sports: ["nfl", "nba", "soccer", "olympics"]
    entertainment: ["movies", "tv", "awards", "celebrity"]
    technology: ["ai", "product_launches", "earnings"]
    other: ["weather", "science", "miscellaneous"]
    
  blacklisted_categories:
    - "sports"  # Higher manipulation risk
    - "entertainment"  # Subjectivity in resolution
    
correlation_management:
  max_position_correlation: 0.70
  correlation_lookback: 720  # 30 days in hours
  correlation_calculation: "pearson"
  diversification_target: 0.50  # Aim for 50% correlation reduction
  hedge_requirement:
    enabled: true
    threshold: 0.80
    hedge_ratio: 0.30
    
drawdown_protection:
  levels:
    warning: 0.03  # 3% drawdown triggers warning
    reduction: 0.05  # 5% drawdown reduces position sizes by 50%
    stop: 0.08  # 8% drawdown stops new positions
    liquidation: 0.10  # 10% drawdown liquidates all positions
    
  recovery_requirements:
    after_warning: 0.02  # Need 2% recovery
    after_reduction: 0.03  # Need 3% recovery
    after_stop: 0.05  # Need 5% recovery
    
volatility_adjustment:
  enabled: true
  volatility_lookback: 168  # 1 week in hours
  adjustment_factors:
    low_volatility: 1.2  # Increase sizes by 20%
    normal_volatility: 1.0  # No adjustment
    high_volatility: 0.7  # Reduce sizes by 30%
    extreme_volatility: 0.5  # Reduce sizes by 50%
    
  volatility_thresholds:
    low: 0.01  # 1% daily volatility
    normal: 0.03  # 3% daily volatility
    high: 0.06  # 6% daily volatility
    extreme: 0.10  # 10% daily volatility
    
liquidity_risk:
  min_market_liquidity: 10000.0  # USD
  max_trade_to_volume: 0.20  # Max 20% of daily volume
  slippage_tolerance: 0.005  # 0.5%
  execution_timeout: 60  # seconds
  partial_fill_handling: "cancel_remainder"
  
concentration_risk:
  max_top_position_concentration: 0.25  # Top position ≤ 25% of portfolio
  max_top_3_concentration: 0.50  # Top 3 positions ≤ 50%
  herfindahl_index_limit: 0.20  # HHI ≤ 0.20
  
market_specific_risks:
  resolution_risk:
    max_days_to_resolution: 60
    min_days_to_resolution: 1
    oracle_types:
      trusted: ["api", "real_world"]
      caution: ["committee", "multi_sig"]
      avoid: ["single_sig", "unknown"]
      
  manipulation_risk:
    volume_spike_threshold: 5.0  # 5x average volume
    price_jump_threshold: 0.10  # 10% price jump
    small_market_warning: 5000.0  # < $5k liquidity
    
  regulatory_risk:
    geographic_restrictions:
      enabled: true
      allowed_countries: ["us", "ca", "uk", "de", "au"]
    tax_reporting:
      enabled: true
      generate_1099: true
      
stress_testing:
  enabled: true
  scenarios:
    - name: "flash_crash"
      price_change: -0.20  # 20% drop
      volume_multiplier: 3.0
      duration: 1  # hour
      
    - name: "liquidity_crisis"
      liquidity_reduction: 0.80  # 80% reduction
      slippage_increase: 0.05  # 5% slippage
      
    - name: "correlation_breakdown"
      correlation_increase: 0.30  # +30% correlation
      diversification_loss: 0.50
      
  frequency: 168  # 1 week in hours
  
reporting_and_monitoring:
  real_time_alerts:
    - "daily_loss_limit"
    - "position_limit_breach"
    - "correlation_violation"
    - "liquidity_warning"
    - "manipulation_detected"
    
  daily_reports:
    enabled: true
    metrics:
      - "portfolio_value"
      - "daily_pnl"
      - "drawdown"
      - "position_counts"
      - "risk_exposures"
      
  weekly_reviews:
    enabled: true
    comprehensive_analysis: true
    strategy_performance: true
    risk_adjustments: true
    
compliance:
  record_keeping:
    trade_logs: true
    forecast_logs: true
    risk_checks: true
    retention_period: 3650  # 10 years in days
    
  audit_trail:
    enabled: true
    immutable_logs: true
    external_verification: false
    
  regulatory_updates:
    check_interval: 720  # 30 days in hours
    automatic_pause: true